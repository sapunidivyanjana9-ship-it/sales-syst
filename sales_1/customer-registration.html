<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📝 Customer Registration - Pearl Land Commodities</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://images.unsplash.com/photo-1596040033229-a9821ebd058d?q=80&w=2070');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 20px;
        }
        body::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 1; }
        .register-container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.35);
            border: 1px solid #D2691E;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(35px); } to { opacity: 1; transform: translateY(0); } }
        .brand-section { text-align: center; margin-bottom: 20px; }
        .brand-section h1 { color: #8B4513; font-size: 26px; margin-bottom: 5px; }
        .brand-section p { color: #D2691E; font-size: 14px; }
        h2 { color: #8B4513; margin-bottom: 25px; text-align: center; border-bottom: 2px dashed #D2691E; padding-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; color: #4A2E1A; margin-bottom: 5px; font-size: 13px; }
        .form-group label .required { color: #e74c3c; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #EBDCCB;
            border-radius: 12px;
            font-size: 14px;
            background: #FEFAF5;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #FF8C42; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .checkbox-group input { width: 18px; height: 18px; }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, #7B3F12, #C45F1C);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
        .register-btn:hover { transform: translateY(-2px); background: linear-gradient(105deg, #6A3510, #B25415); }
        .error-message { background: #FFECEB; color: #C73D23; padding: 12px; border-radius: 50px; margin-bottom: 20px; display: none; font-weight: 500; text-align: center; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 50px; margin-bottom: 20px; display: none; font-weight: 500; text-align: center; }
        .login-link { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 2px dashed #E4CBB1; }
        .login-link a { color: #8B4513; text-decoration: none; font-weight: 600; }
        .spice-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .spice-option { display: flex; align-items: center; gap: 8px; }
        .spice-option input { width: 18px; height: 18px; }
        @media (max-width: 600px) { .register-container { padding: 25px 20px; } .form-row { grid-template-columns: 1fr; } .spice-options { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="brand-section"><h1>🌶️ Pearl Land Commodities</h1><p>Join as a Valued Customer</p></div>
        <h2>📋 Customer Registration</h2>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage">✅ Registration successful! Redirecting to login...</div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group"><label>First Name <span class="required">*</span></label><input type="text" id="firstName" required></div>
                <div class="form-group"><label>Last Name <span class="required">*</span></label><input type="text" id="lastName" required></div>
            </div>
            <div class="form-group"><label>Email Address <span class="required">*</span></label><input type="email" id="email" required></div>
            <div class="form-row">
                <div class="form-group"><label>Phone Number <span class="required">*</span> (10 digits only)</label><input type="tel" id="phone" maxlength="10" placeholder="0712345678" required></div>
                <div class="form-group"><label>Select City <span class="required">*</span></label>
                    <select id="city" required>
                        <option value="">Select City</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Gampaha">Gampaha</option>
                        <option value="Kalutara">Kalutara</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Matale">Matale</option>
                        <option value="Nuwara Eliya">Nuwara Eliya</option>
                        <option value="Galle">Galle</option>
                        <option value="Matara">Matara</option>
                        <option value="Hambantota">Hambantota</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Kurunegala">Kurunegala</option>
                        <option value="Anuradhapura">Anuradhapura</option>
                        <option value="Polonnaruwa">Polonnaruwa</option>
                        <option value="Badulla">Badulla</option>
                        <option value="Ratnapura">Ratnapura</option>
                        <option value="Kegalle">Kegalle</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Postal Code <span class="required">*</span> (5 digits only)</label><input type="text" id="postalCode" maxlength="5" placeholder="e.g., 00300" required></div>
            </div>
            <div class="form-group"><label>Address <span class="required">*</span></label><textarea id="address" rows="2" required></textarea></div>
            
            <!-- Spice Preferences - Checkboxes -->
            <div class="form-group"><label>🌶️ Spice Preferences (Select your favorites)</label>
                <div class="spice-options">
                    <label class="spice-option"><input type="checkbox" value="Turmeric"> Turmeric Powder</label>
                    <label class="spice-option"><input type="checkbox" value="Chili"> Chili Powder</label>
                    <label class="spice-option"><input type="checkbox" value="Cinnamon"> Cinnamon Sticks</label>
                    <label class="spice-option"><input type="checkbox" value="Black Pepper"> Black Pepper</label>
                    <label class="spice-option"><input type="checkbox" value="Cardamom"> Cardamom</label>
                    <label class="spice-option"><input type="checkbox" value="Cloves"> Cloves</label>
                    <label class="spice-option"><input type="checkbox" value="Coriander"> Coriander Powder</label>
                    <label class="spice-option"><input type="checkbox" value="Curry Powder"> Curry Powder</label>
                    <label class="spice-option"><input type="checkbox" value="Fenugreek"> Fenugreek</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group"><label>Username <span class="required">*</span> (Choose unique username)</label><input type="text" id="username" placeholder="e.g., saman_cust" required></div>
                <div class="form-group"><label>Password <span class="required">*</span> (Min 6 chars, 1 number, 1 uppercase)</label><input type="password" id="password" required></div>
            </div>
            <div class="form-group"><label>Confirm Password <span class="required">*</span></label><input type="password" id="confirmPassword" required></div>

            <div class="checkbox-group"><input type="checkbox" id="terms" required><label for="terms">I agree to the Terms & Conditions <span class="required">*</span></label></div>
            <div class="checkbox-group"><input type="checkbox" id="newsletter"><label for="newsletter">📧 Subscribe to spice offers & seasonal discounts</label></div>

            <button type="submit" class="register-btn">🌶️ Create Customer Account</button>
        </form>
        <div class="login-link">Already have an account? <a href="index.html">Sign in here</a></div>
    </div>

    <script>
        // Phone validation - only 10 digits
        function validatePhone(phone) {
            const phoneRegex = /^[0-9]{10}$/;
            return phoneRegex.test(phone);
        }

        // Postal code validation - exactly 5 digits
        function validatePostalCode(postalCode) {
            const postalRegex = /^[0-9]{5}$/;
            return postalRegex.test(postalCode);
        }

        // Password validation
        function validatePassword(password) {
            if (password.length < 6) return false;
            if (!/[0-9]/.test(password)) return false;
            if (!/[A-Z]/.test(password)) return false;
            return true;
        }

        // Username validation - at least 4 chars
        function validateUsername(username) {
            return username.length >= 4;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous error
            document.getElementById('errorMessage').style.display = 'none';
            
            // Get values
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value;
            const postalCode = document.getElementById('postalCode').value.trim();
            const address = document.getElementById('address').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // Get selected spices
            const selectedSpices = [];
            document.querySelectorAll('.spice-option input:checked').forEach(cb => {
                selectedSpices.push(cb.value);
            });
            
            // Validations
            if (!firstName || !lastName || !email || !phone || !city || !postalCode || !address || !username || !password) {
                showError('All fields marked with * are required');
                return;
            }
            
            if (!validatePhone(phone)) {
                showError('Phone number must be exactly 10 digits (e.g., 0712345678). No letters or special characters allowed.');
                return;
            }
            
            if (!validatePostalCode(postalCode)) {
                showError('Postal code must be exactly 5 digits (e.g., 00300)');
                return;
            }
            
            if (!validateUsername(username)) {
                showError('Username must be at least 4 characters long');
                return;
            }
            
            if (!validatePassword(password)) {
                showError('Password must be at least 6 characters, contain at least 1 number and 1 uppercase letter');
                return;
            }
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            if (!terms) {
                showError('You must agree to the Terms & Conditions');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Prepare data
            const data = {
                full_name: firstName + ' ' + lastName,
                username: username,
                email: email,
                phone: phone,
                address: address,
                city: city,
                postal_code: postalCode,
                spice_preferences: selectedSpices.join(', '),
                newsletter: document.getElementById('newsletter').checked ? 1 : 0,
                password: password,
                role: 'customer'
            };
            
            try {
                const response = await fetch('api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('successMessage').style.display = 'block';
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else {
                    showError(result.message);
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            }
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '⚠️ ' + msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
        }
        
        // Real-time phone validation
        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });
        
        // Real-time postal code validation
        document.getElementById('postalCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
        });
    </script>
</body>
</html>
